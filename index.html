```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타로 카드로 보는 운명</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at center,
    #5c2d91 0%,
    #1d0b2e 50%,
    #000 100%);

    color:white;
    font-family:"Pretendard",sans-serif;
}

/* 별빛 배경 */
body::before{
    content:"✦ ✦ ✦ ✦ ✦ ✦ ✦";
    position:absolute;
    width:100%;
    top:10%;
    text-align:center;
    font-size:2rem;
    opacity:.3;
    animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:.7;}
}

h1{
    font-size:3rem;
    margin-bottom:15px;
    animation:titleGlow 2s infinite alternate;
}

@keyframes titleGlow{
    from{
        opacity:.7;
        text-shadow:0 0 10px #fff;
    }
    to{
        opacity:1;
        text-shadow:
        0 0 20px #fff,
        0 0 40px #b47cff;
    }
}

.subtitle{
    color:#d9c8ff;
    margin-bottom:50px;
}

.cards{
    display:flex;
    gap:40px;
    perspective:1200px;
}

/* 카드 */
.card{
    width:220px;
    height:340px;
    cursor:pointer;
    opacity:0;

    animation:fadeCard 4s infinite;
}

.card:nth-child(1){
    animation-delay:0s;
}

.card:nth-child(2){
    animation-delay:0.7s;
}

.card:nth-child(3){
    animation-delay:1.4s;
}

@keyframes fadeCard{

    0%{
        opacity:0;
        transform:translateY(30px);
    }

    25%{
        opacity:1;
        transform:translateY(0);
    }

    75%{
        opacity:1;
        transform:translateY(0);
    }

    100%{
        opacity:.5;
        transform:translateY(-10px);
    }
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;

    transition:1s;
    transform-style:preserve-3d;
}

.card.active .card-inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    backface-visibility:hidden;
}

/* 카드 뒷면 */
.front{
    background:
    linear-gradient(
    135deg,
    #2b1645,
    #7c3aed);

    border:3px solid #e8dbff;

    font-size:5rem;

    box-shadow:
    0 0 25px rgba(180,124,255,.5);
}

/* 카드 앞면 */
.back{
    background:white;
    color:#222;

    transform:rotateY(180deg);

    flex-direction:column;
    text-align:center;
    padding:20px;
}

.back h2{
    margin-bottom:15px;
    color:#6d28d9;
}

.result{
    margin-top:50px;
    min-height:50px;
    font-size:1.3rem;
    color:#ffe58f;
    text-align:center;
}

.hide{
    opacity:0 !important;
    pointer-events:none;
    transition:.8s;
}

</style>
</head>

<body>

<h1>🔮 타로 카드로 보는 운명</h1>
<div class="subtitle">
세 장의 카드 중 하나를 선택하세요
</div>

<div class="cards">

    <div class="card" onclick="pickCard(this,0)">
        <div class="card-inner">
            <div class="front">✦</div>

            <div class="back">
                <h2>☀ 태양</h2>
                <p>
                당신에게 큰 행운과
                새로운 기회가 찾아옵니다.
                </p>
            </div>
        </div>
    </div>

    <div class="card" onclick="pickCard(this,1)">
        <div class="card-inner">
            <div class="front">✦</div>

            <div class="back">
                <h2>⭐ 별</h2>
                <p>
                꿈꾸던 일이
                현실로 다가오고 있습니다.
                </p>
            </div>
        </div>
    </div>

    <div class="card" onclick="pickCard(this,2)">
        <div class="card-inner">
            <div class="front">✦</div>

            <div class="back">
                <h2>🌙 달</h2>
                <p>
                직감을 믿으세요.
                중요한 선택이 기다립니다.
                </p>
            </div>
        </div>
    </div>

</div>

<div class="result" id="result">
카드를 선택하면 운명이 공개됩니다.
</div>

<script>

let selected = false;

const messages = [
"☀ 태양 카드가 선택되었습니다. 성공과 자신감이 당신을 이끕니다.",
"⭐ 별 카드가 선택되었습니다. 희망과 새로운 인연이 찾아옵니다.",
"🌙 달 카드가 선택되었습니다. 직감을 믿고 천천히 나아가세요."
];

function pickCard(card,index){

    if(selected) return;
    selected = true;

    const cards =
    document.querySelectorAll(".card");

    cards.forEach(c=>{
        if(c !== card){
            c.classList.add("hide");
        }
    });

    setTimeout(()=>{
        card.classList.add("active");
    },500);

    document.getElementById("result").innerHTML =
    messages[index];
}

</script>

</body>
</html>
```
